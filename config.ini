[router]
mode = cost_saving
auto_switch = true
cooldown_seconds = 60
max_errors = 3
low_balance_alert = true
low_balance_threshold = 1.0

[providers]
order = openclaw,zhipu_flash,baidu_speed,siliconflow_free,deepseek,tongyi

[stt]
model = base
language = zh
device = cpu

[tts]
provider = edge_tts
voice = zh-CN-XiaoxiaoNeural

[system]
autostart = false
minimize_to_tray = true
http_port = 8766
https_port = 8765
first_run = true

[ui]
theme = dark
language = zh
show_tray_tips = true

