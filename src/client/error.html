<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0b0b16;
  color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 40px;
  text-align: center;
}
.icon { font-size: 48px; margin-bottom: 16px; }
h1 { font-size: 20px; margin-bottom: 12px; }
p { color: #888; font-size: 14px; line-height: 1.8; margin-bottom: 20px; max-width: 480px; }
code { display: inline-block; background: #1a1a2e; padding: 6px 12px; border-radius: 6px; color: #7c6aef; font-size: 13px; margin: 4px 0; }
.tips { text-align: left; background: #111122; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; max-width: 420px; font-size: 13px; color: #999; line-height: 1.8; }
.tips li { margin-bottom: 4px; }
.btn {
  background: #7c6aef;
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  margin: 4px;
}
.btn:hover { background: #6b59de; }
.btn-ghost {
  background: transparent;
  border: 1px solid #333;
  color: #aaa;
}
.status { font-size: 12px; color: #555; margin-top: 16px; }
</style>
</head>
<body>
  <div class="icon">⏱️</div>
  <h1>AI 引擎启动超时</h1>
  <p>
    Python 后端未能在规定时间内就绪。<br>
    这通常是因为首次加载 AI 模型较慢，或端口被占用。
  </p>
  <ul class="tips">
    <li>💡 首次启动加载模型可能需要 1-3 分钟，请耐心等待</li>
    <li>🔄 点击下方「重试」按钮检查是否已就绪</li>
    <li>🔌 如端口 8766 被占用，请关闭其他实例后重试</li>
    <li>💻 也可手动启动：<code>python -m src.server.main</code></li>
  </ul>
  <div>
    <button class="btn" onclick="checkAndReload()">重试</button>
    <button class="btn btn-ghost" onclick="window.open('/qr','_self')">打开扫码页</button>
    <button class="btn btn-ghost" onclick="window.close()">退出</button>
  </div>
  <div class="status" id="status"></div>
  <script>
  function checkAndReload() {
    var s = document.getElementById('status');
    s.textContent = '正在检测后端状态...';
    fetch('/api/ping', {signal: AbortSignal.timeout(3000)})
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          s.textContent = '✅ 后端已就绪，正在跳转...';
          setTimeout(function(){ location.href = '/app'; }, 500);
        } else {
          s.textContent = '❌ 后端仍未就绪，请稍后再试';
        }
      })
      .catch(function() {
        s.textContent = '❌ 无法连接后端（端口 8766），请检查服务是否启动';
      });
  }
  </script>
</body>
</html>
