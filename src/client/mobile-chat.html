<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>十三香小龙虾</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d14;color:#eee;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column}
.header{padding:12px 16px;background:#131321;border-bottom:1px solid #222;text-align:center;font-size:16px;font-weight:600}
.messages{flex:1;overflow-y:auto;padding:12px 16px}
.msg{margin-bottom:12px;max-width:85%}
.msg.user{margin-left:auto;background:#6c63ff;padding:10px 14px;border-radius:14px 14px 4px 14px;font-size:14px}
.msg.ai{background:#1a1a2e;padding:10px 14px;border-radius:14px 14px 14px 4px;font-size:14px;line-height:1.6}
.input-area{display:flex;gap:8px;padding:10px 12px;background:#131321;border-top:1px solid #222}
.input-area input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid #333;background:#0b0d14;color:#eee;font-size:15px;outline:none}
.input-area button{padding:10px 18px;border-radius:20px;border:none;background:#6c63ff;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.typing{color:#888;font-size:13px;padding:8px 14px}
</style>
</head>
<body>
<div class="header">🦞 十三香小龙虾</div>
<div class="messages" id="msgs">
  <div class="msg ai">你好！我是十三香小龙虾AI工作队。说一句话，52个AI帮你干活。</div>
</div>
<div class="input-area">
  <input id="input" placeholder="输入消息..." enterkeyhint="send">
  <button onclick="send()">发送</button>
</div>
<script>
var base = location.origin;
var input = document.getElementById('input');
var msgs = document.getElementById('msgs');
input.addEventListener('keydown', function(e){ if(e.key==='Enter') send(); });

async function send(){
  var text = input.value.trim();
  if(!text) return;
  input.value = '';
  msgs.innerHTML += '<div class="msg user">' + esc(text) + '</div>';
  msgs.innerHTML += '<div class="typing" id="typing">思考中...</div>';
  msgs.scrollTop = msgs.scrollHeight;
  try{
    var r = await fetch(base + '/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'user',content:text}],stream:true})
    });
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var full = '';
    var el = document.getElementById('typing');
    if(el) el.className = 'msg ai';
    while(true){
      var chunk = await reader.read();
      if(chunk.done) break;
      var lines = decoder.decode(chunk.value).split('\n');
      for(var line of lines){
        line = line.trim();
        if(!line.startsWith('data:')) continue;
        var data = line.slice(5).trim();
        if(data==='[DONE]') continue;
        try{
          var parsed = JSON.parse(data);
          var delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta && parsed.choices[0].delta.content;
          if(delta){ full += delta; if(el) el.innerHTML = esc(full); }
        }catch(e){}
      }
    }
    if(!full && el) el.innerHTML = '(无回复)';
  }catch(e){
    var el = document.getElementById('typing');
    if(el){ el.className = 'msg ai'; el.textContent = '错误: ' + e.message; }
  }
  msgs.scrollTop = msgs.scrollHeight;
}
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
</body>
</html>
