<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0b0d14">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
<title>十三香小龙虾 AI 工作队</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0b0d14;color:#eeeef5;
  font-family:-apple-system,'Segoe UI',system-ui,'PingFang SC','Microsoft YaHei',sans-serif;
  padding:20px;overflow-y:auto;
}
.page{max-width:420px;width:100%;animation:fadeIn .6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{box-shadow:0 4px 20px rgba(108,99,255,0.3)}50%{box-shadow:0 4px 32px rgba(108,99,255,0.5)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── 头部品牌 ── */
.brand{text-align:center;margin-bottom:28px}
.brand-logo{font-size:52px;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(231,76,60,0.3))}
.brand h1{font-size:24px;font-weight:800;
  background:linear-gradient(135deg,#fff,#7c6aef);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand p{font-size:14px;color:#9898b0;margin-top:4px}
.brand-stats{display:flex;justify-content:center;gap:20px;margin-top:14px}
.stat{text-align:center}
.stat-num{font-size:20px;font-weight:800;color:#7c6aef}
.stat-label{font-size:10px;color:#5e5e78;margin-top:1px}

/* ── CTA 按钮 ── */
.cta{
  display:block;width:100%;padding:15px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#6c63ff,#9484f7);color:#fff;
  font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;
  transition:all .2s;animation:glow 3s ease-in-out infinite;
}
.cta:hover{filter:brightness(1.12);transform:translateY(-2px)}

/* ── 连接方式 tabs ── */
.connect-section{margin-top:24px}
.connect-tabs{display:flex;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);margin-bottom:16px}
.connect-tab{
  flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;border:none;font-family:inherit;
  background:rgba(255,255,255,0.02);color:#9898b0;
}
.connect-tab:first-child{border-right:1px solid rgba(255,255,255,0.08)}
.connect-tab.active{background:rgba(124,106,239,0.12);color:#7c6aef}
.connect-tab:hover:not(.active){background:rgba(255,255,255,0.04)}

.connect-panel{display:none;text-align:center;padding:16px;
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;animation:fadeIn .3s ease}
.connect-panel.active{display:block}

/* ── QR 码 ── */
.qr-wrap{display:inline-block;padding:10px;background:#fff;border-radius:12px;margin-bottom:12px;
  box-shadow:0 2px 16px rgba(0,0,0,0.2)}
.qr-wrap img{display:block;width:180px;height:180px;border-radius:4px}
.qr-label{font-size:13px;color:#9898b0;margin-bottom:6px}
.qr-url{
  display:inline-block;font-size:11px;color:#7c6aef;
  font-family:'Cascadia Code',Consolas,monospace;
  padding:5px 12px;background:rgba(124,106,239,0.08);border-radius:6px;
  cursor:pointer;transition:all .2s;
}
.qr-url:hover{background:rgba(124,106,239,0.15)}

/* ── iLink 按钮 ── */
.ilink-btn{
  padding:12px 24px;border:1px solid #22c55e;border-radius:10px;
  background:rgba(34,197,94,0.06);color:#22c55e;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.ilink-btn:hover{background:rgba(34,197,94,0.12);transform:translateY(-1px)}
.ilink-btn:disabled{opacity:.5;cursor:default;transform:none}

/* ── IP 折叠 ── */
.ip-toggle{margin-top:8px;font-size:10px;color:#5e5e78;cursor:pointer;
  background:none;border:none;font-family:inherit}
.ip-toggle:hover{color:#9898b0}
.ip-list{display:none;margin-top:6px;font-size:10px;color:#5e5e78;line-height:1.8}
.ip-list.open{display:block}

/* ── 护城河 ── */
.moat{
  margin-top:20px;padding:12px 16px;border-radius:12px;
  background:rgba(124,106,239,0.04);border:1px solid rgba(124,106,239,0.1);
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;
}
.moat:hover{border-color:rgba(124,106,239,0.2);background:rgba(124,106,239,0.08)}
.moat-icon{font-size:22px}
.moat-info{flex:1;text-align:left}
.moat-level{font-size:13px;color:#eeeef5;font-weight:600}
.moat-desc{font-size:10px;color:#5e5e78;margin-top:2px}
.moat-score-wrap{text-align:center}
.moat-num{font-size:18px;font-weight:800;color:#7c6aef}
.moat-max{font-size:9px;color:#5e5e78}

/* ── 底部 ── */
.footer{margin-top:16px;text-align:center;font-size:10px;color:#3e3e58}
.footer a{color:#5e5e78;text-decoration:none}
.footer a:hover{color:#9898b0}

/* ── 移动端 ── */
@media(max-width:480px){
  .brand-logo{font-size:42px}
  .brand h1{font-size:20px}
  .stat-num{font-size:16px}
  .cta{font-size:14px;padding:13px}
  .qr-wrap img{width:150px;height:150px}
  .connect-tab{font-size:12px;padding:8px}
}
</style>
</head>
<body>
<div class="page">

  <!-- 品牌头部 -->
  <div class="brand">
    <div class="brand-logo">🦞</div>
    <h1>十三香小龙虾 AI 工作队</h1>
    <p>说一句话，52个AI帮你干活</p>
    <div class="brand-stats">
      <div class="stat"><div class="stat-num">52</div><div class="stat-label">AI 员工</div></div>
      <div class="stat"><div class="stat-num">13+</div><div class="stat-label">AI 平台</div></div>
      <div class="stat"><div class="stat-num" id="stat-projects">0</div><div class="stat-label">项目积累</div></div>
    </div>
  </div>

  <!-- CTA -->
  <a href="/app" class="cta">▶ 开始使用</a>

  <!-- 连接方式 -->
  <div class="connect-section">
    <div class="connect-tabs">
      <button class="connect-tab active" onclick="_switchTab('phone')">📱 手机扫码</button>
      <button class="connect-tab" onclick="_switchTab('wechat')">💬 微信 ClawBot</button>
    </div>

    <!-- 手机扫码面板 -->
    <div class="connect-panel active" id="panel-phone">
      <div class="qr-wrap">
        <img id="qr-img" src="" alt="QR" style="background:#eee">
      </div>
      <p class="qr-label">手机扫码，远程使用 AI 工作队</p>
      <div class="qr-url" id="qr-url" onclick="navigator.clipboard.writeText(this.dataset.url).then(()=>{var o=this.textContent;this.textContent='✅ 已复制';setTimeout(()=>{this.textContent=o},1500)})">
        加载中...
      </div>
      <button class="ip-toggle" onclick="document.getElementById('ip-list').classList.toggle('open')">更多 IP ▾</button>
      <div class="ip-list" id="ip-list"></div>
    </div>

    <!-- 微信 ClawBot 面板 -->
    <div class="connect-panel" id="panel-wechat">
      <p id="ilink-status" style="font-size:13px;color:#9898b0;margin-bottom:12px">检查连接状态...</p>
      <button class="ilink-btn" id="ilink-btn" onclick="window._ilinkConnect()" style="display:none">💬 绑定微信 ClawBot</button>
      <div id="ilink-qr" style="display:none;margin-top:12px">
        <div class="qr-wrap">
          <img id="ilink-qr-img" src="" style="width:180px;height:180px">
        </div>
        <p style="font-size:12px;color:#9898b0;margin-top:8px">用微信扫描绑定</p>
      </div>
      <p style="font-size:10px;color:#5e5e78;margin-top:10px">腾讯官方 iLink 协议 · 绑定后在微信中直接对话 AI 团队</p>
    </div>
  </div>

  <!-- 护城河 -->
  <div class="moat" id="moat-bar" style="display:none" onclick="location.href='/app'">
    <span class="moat-icon" id="moat-icon">🌱</span>
    <div class="moat-info">
      <div class="moat-level" id="moat-level">AI 学习进度</div>
      <div class="moat-desc" id="moat-desc">AI 正在学习你的业务</div>
    </div>
    <div class="moat-score-wrap">
      <div class="moat-num" id="moat-score">0</div>
      <div class="moat-max">/100</div>
    </div>
  </div>

  <div class="footer">
    <a href="/app">进入工作台</a> · <a href="/report" onclick="return false">项目报告</a> · v6.0
  </div>
</div>

<script>
// Tab 切换
function _switchTab(tab) {
  document.querySelectorAll('.connect-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.connect-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

(async function(){
  // 1. 服务器信息 → 手机 QR
  try {
    const r = await fetch('/api/server-info');
    const info = await r.json();
    const ips = info.ips || [];
    const port = info.http_port || location.port || '8766';
    // 优先选 192.168 开头的WiFi IP（手机能访问的）
    const wifiIp = ips.find(ip => ip.startsWith('192.168.')) || ips.find(ip => ip.startsWith('10.')) || ips[0];
    const mainUrl = ips.length ? `http://${wifiIp}:${port}/app` : `${location.origin}/app`;
    const urlEl = document.getElementById('qr-url');
    urlEl.textContent = mainUrl;
    urlEl.dataset.url = mainUrl;
    document.getElementById('qr-img').src = `/api/qr?url=${encodeURIComponent(mainUrl)}&size=180`;
    if (ips.length > 1) {
      document.getElementById('ip-list').innerHTML = ips.map(ip => `<div>http://${ip}:${port}/app</div>`).join('');
    }
  } catch(e) {
    const u = `${location.origin}/app`;
    document.getElementById('qr-url').textContent = u;
    document.getElementById('qr-url').dataset.url = u;
    document.getElementById('qr-img').src = `/api/qr?url=${encodeURIComponent(u)}&size=180`;
  }

  // 2. iLink 状态
  try {
    const ir = await fetch('/api/ilink/status');
    const id = await ir.json();
    const statusEl = document.getElementById('ilink-status');
    const btnEl = document.getElementById('ilink-btn');
    if (id.connected) {
      statusEl.innerHTML = '<span style="color:#22c55e">✅ 已连接</span>' + (id.running ? ' · 消息监听中' : '');
      btnEl.style.display = 'inline-block';
      btnEl.textContent = '断开连接';
      btnEl.style.borderColor = '#ef4444'; btnEl.style.color = '#ef4444';
      btnEl.style.background = 'rgba(239,68,68,0.06)';
      btnEl.onclick = async function() { await fetch('/api/ilink/disconnect',{method:'POST'}); location.reload(); };
    } else {
      statusEl.textContent = '绑定后可在微信中直接使用 AI 工作队';
      btnEl.style.display = 'inline-block';
    }
  } catch(e) {
    document.getElementById('ilink-status').textContent = '绑定微信，随时随地使用 AI';
    document.getElementById('ilink-btn').style.display = 'inline-block';
  }

  // 3. 护城河分数
  try {
    const r = await fetch('/api/moat-score');
    const d = await r.json();
    if (d.total != null) {
      document.getElementById('moat-bar').style.display = 'flex';
      document.getElementById('moat-icon').textContent = d.level_icon || '🌱';
      document.getElementById('moat-level').textContent = d.level || 'AI 学习进度';
      document.getElementById('moat-desc').textContent = d.level_desc || '';
      document.getElementById('moat-score').textContent = d.total;
    }
    // 项目数
    const pr = await fetch('/api/projects');
    const pd = await pr.json();
    document.getElementById('stat-projects').textContent = (pd.projects||[]).length;
  } catch(e) {}
})();

// iLink 绑定
window._ilinkConnect = async function() {
  const btn = document.getElementById('ilink-btn');
  const qrDiv = document.getElementById('ilink-qr');
  const statusEl = document.getElementById('ilink-status');
  btn.disabled = true; btn.textContent = '获取二维码...';
  try {
    const r = await fetch('/api/ilink/login', {method:'POST'});
    const d = await r.json();
    if (!d.ok) { statusEl.textContent = '失败: '+(d.error||''); btn.disabled=false; btn.textContent='💬 绑定微信 ClawBot'; return; }
    const img = document.getElementById('ilink-qr-img');
    if (d.qrcode_img) {
      img.src = d.qrcode_img.startsWith('http')
        ? '/api/qr?url='+encodeURIComponent(d.qrcode_img)+'&size=180'
        : d.qrcode_img.startsWith('data:') ? d.qrcode_img : 'data:image/png;base64,'+d.qrcode_img;
    }
    qrDiv.style.display = 'block'; btn.style.display = 'none';
    statusEl.textContent = '请用微信扫描二维码';
    for (let i=0;i<60;i++) {
      await new Promise(r=>setTimeout(r,2000));
      try {
        const sr = await fetch('/api/ilink/qrcode-status?qrcode_id='+encodeURIComponent(d.qrcode_id));
        const sd = await sr.json();
        if (sd.connected) { statusEl.innerHTML='<span style="color:#22c55e">✅ 绑定成功！</span>'; qrDiv.style.display='none'; setTimeout(()=>location.reload(),2000); return; }
      } catch(e){}
    }
    statusEl.textContent='二维码过期'; qrDiv.style.display='none'; btn.style.display='inline-block'; btn.disabled=false; btn.textContent='💬 绑定微信 ClawBot';
  } catch(e) { statusEl.textContent='失败: '+e.message; btn.disabled=false; btn.textContent='💬 绑定微信 ClawBot'; }
};
</script>
</body>
</html>
