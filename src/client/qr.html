<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0b0d14">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
<title>十三香小龙虾 AI 工作队</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0b0d14;color:#eeeef5;
  font-family:-apple-system,'Segoe UI',system-ui,'PingFang SC','Microsoft YaHei',sans-serif;
  padding:20px;
}
.page{
  max-width:440px;width:100%;text-align:center;
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* Brand */
.logo{font-size:56px;margin-bottom:12px}
h1{font-size:26px;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,#eeeef5,#7c6aef);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:15px;color:#9898b0;margin-bottom:32px}

/* CTA Button */
.cta{
  display:block;width:100%;padding:16px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#6c63ff,#9484f7);color:#fff;
  font-size:17px;font-weight:700;cursor:pointer;
  transition:all .2s;text-decoration:none;
  box-shadow:0 4px 20px rgba(108,99,255,0.3);
}
.cta:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 28px rgba(108,99,255,0.4)}
.cta:active{transform:translateY(0)}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;margin:28px 0;
  color:#5e5e78;font-size:12px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* QR Section */
.qr-section{
  padding:20px;border-radius:14px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
}
.qr-frame{
  display:inline-block;padding:8px;background:#fff;border-radius:10px;
  margin-bottom:12px;
}
.qr-frame img{display:block;width:160px;height:160px;border-radius:4px}
.qr-hint{font-size:13px;color:#9898b0;margin-bottom:8px}
.qr-url{
  font-size:12px;color:#7c6aef;font-family:'Cascadia Code',Consolas,monospace;
  padding:6px 12px;background:rgba(124,106,239,0.08);border-radius:8px;
  cursor:pointer;transition:background .2s;display:inline-block;
}
.qr-url:hover{background:rgba(124,106,239,0.15)}

/* IP expand */
.ip-toggle{
  margin-top:10px;font-size:11px;color:#5e5e78;cursor:pointer;
  background:none;border:none;font-family:inherit;
}
.ip-toggle:hover{color:#9898b0}
.ip-list{
  display:none;margin-top:8px;font-size:11px;color:#5e5e78;
  line-height:1.8;
}
.ip-list.open{display:block}

/* Moat bar */
.moat{
  margin-top:24px;padding:10px 16px;border-radius:10px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:10px;
}
.moat-icon{font-size:18px}
.moat-info{flex:1;text-align:left}
.moat-level{font-size:12px;color:#eeeef5;font-weight:600}
.moat-desc{font-size:10px;color:#5e5e78;margin-top:1px}
.moat-score{font-size:14px;font-weight:700;color:#7c6aef}

/* Footer */
.footer{margin-top:20px;font-size:10px;color:#3e3e58}

/* Mobile */
@media(max-width:480px){
  .logo{font-size:44px}
  h1{font-size:22px}
  .tagline{font-size:13px;margin-bottom:24px}
  .cta{font-size:15px;padding:14px}
  .qr-frame img{width:140px;height:140px}
}
</style>
</head>
<body>
<div class="page">
  <div class="logo">🦞</div>
  <h1>十三香小龙虾 AI 工作队</h1>
  <p class="tagline">说一句话，52个AI帮你干活</p>

  <a href="/app" class="cta" id="cta-btn">▶ 开始使用</a>

  <div class="divider">手机扫码连接</div>

  <div class="qr-section">
    <div class="qr-frame">
      <img id="qr-img" src="" alt="QR Code" style="background:#eee">
    </div>
    <p class="qr-hint">用手机扫描二维码，即可远程使用</p>
    <div class="qr-url" id="qr-url" onclick="navigator.clipboard.writeText(this.textContent).then(()=>{this.textContent='已复制!';setTimeout(()=>{this.textContent=this.dataset.url},1500)})">
      加载中...
    </div>
    <button class="ip-toggle" onclick="document.getElementById('ip-list').classList.toggle('open')">
      更多 IP 地址 ▾
    </button>
    <div class="ip-list" id="ip-list"></div>
  </div>

  <!-- 微信 ClawBot 接入 -->
  <div class="divider">微信 ClawBot 官方接入</div>
  <div id="ilink-section" style="text-align:center">
    <div id="ilink-status" style="font-size:13px;color:#9898b0;margin-bottom:10px">检查连接状态...</div>
    <button id="ilink-btn" onclick="window._ilinkConnect()" style="
      padding:12px 28px;border:1px solid #22c55e;border-radius:10px;
      background:rgba(34,197,94,0.08);color:#22c55e;font-size:14px;font-weight:600;
      cursor:pointer;transition:all .2s;font-family:inherit;display:none;
    ">💬 绑定微信 ClawBot</button>
    <div id="ilink-qr" style="display:none;margin-top:10px">
      <div style="display:inline-block;padding:8px;background:#fff;border-radius:10px">
        <img id="ilink-qr-img" src="" style="width:160px;height:160px;border-radius:4px">
      </div>
      <p style="font-size:12px;color:#9898b0;margin-top:8px">用微信扫码绑定 ClawBot</p>
    </div>
  </div>

  <div class="moat" id="moat-bar" style="display:none">
    <span class="moat-icon" id="moat-icon">🌱</span>
    <div class="moat-info">
      <div class="moat-level" id="moat-level">护城河</div>
      <div class="moat-desc" id="moat-desc">AI 正在学习你的业务</div>
    </div>
    <span class="moat-score" id="moat-score">0</span>
  </div>

  <div class="footer">十三香小龙虾 AI 工作队 · 越用越懂你</div>
</div>

<script>
(async function(){
  // 获取服务器信息
  try {
    const r = await fetch('/api/server-info');
    const info = await r.json();

    // 设置 QR URL
    const ips = info.ips || info.lan_ips || [];
    const port = info.http_port || location.port || '8766';
    const mainUrl = ips.length ? `http://${ips[0]}:${port}/chat` : `${location.origin}/chat`;

    const urlEl = document.getElementById('qr-url');
    urlEl.textContent = mainUrl;
    urlEl.dataset.url = mainUrl;

    // 生成 QR 码图片
    document.getElementById('qr-img').src = `/api/qr?url=${encodeURIComponent(mainUrl)}&size=160`;

    // 其他 IP
    if (ips.length > 1) {
      const ipList = document.getElementById('ip-list');
      ipList.innerHTML = ips.map(ip => `<div>http://${ip}:${port}/chat</div>`).join('');
    }
  } catch(e) {
    document.getElementById('qr-url').textContent = `${location.origin}/chat`;
  }

  // iLink 状态
  try {
    const ir = await fetch('/api/ilink/status');
    const id = await ir.json();
    const statusEl = document.getElementById('ilink-status');
    const btnEl = document.getElementById('ilink-btn');
    if (id.connected) {
      statusEl.textContent = '✅ 微信 ClawBot 已连接' + (id.running ? '（运行中）' : '');
      statusEl.style.color = '#22c55e';
      btnEl.style.display = 'inline-block';
      btnEl.textContent = '断开连接';
      btnEl.style.borderColor = '#ef4444';
      btnEl.style.color = '#ef4444';
      btnEl.style.background = 'rgba(239,68,68,0.08)';
      btnEl.onclick = async function() {
        await fetch('/api/ilink/disconnect', {method:'POST'});
        location.reload();
      };
    } else {
      statusEl.textContent = '未连接 — 绑定后可在微信中直接使用 AI 工作队';
      btnEl.style.display = 'inline-block';
    }
  } catch(e) {
    document.getElementById('ilink-status').textContent = '微信 ClawBot 功能可用';
    document.getElementById('ilink-btn').style.display = 'inline-block';
  }

  // 护城河分数
  try {
    const r = await fetch('/api/moat-score');
    const d = await r.json();
    if (d.total != null) {
      document.getElementById('moat-bar').style.display = 'flex';
      document.getElementById('moat-icon').textContent = d.level_icon || '🌱';
      document.getElementById('moat-level').textContent = d.level || '护城河';
      document.getElementById('moat-desc').textContent = d.level_desc || '';
      document.getElementById('moat-score').textContent = d.total;
    }
  } catch(e) {}
})();

// iLink 绑定流程
window._ilinkConnect = async function() {
  const btn = document.getElementById('ilink-btn');
  const qrDiv = document.getElementById('ilink-qr');
  const statusEl = document.getElementById('ilink-status');
  btn.disabled = true;
  btn.textContent = '正在获取二维码...';

  try {
    const r = await fetch('/api/ilink/login', {method:'POST'});
    const d = await r.json();
    if (!d.ok) { statusEl.textContent = '获取二维码失败: ' + (d.error||''); btn.disabled = false; btn.textContent = '💬 绑定微信 ClawBot'; return; }

    // 显示二维码
    const img = document.getElementById('ilink-qr-img');
    if (d.qrcode_img) {
      img.src = d.qrcode_img.startsWith('data:') ? d.qrcode_img : 'data:image/png;base64,' + d.qrcode_img;
    }
    qrDiv.style.display = 'block';
    btn.style.display = 'none';
    statusEl.textContent = '请用微信扫描上方二维码';

    // 轮询扫码状态
    const qrcodeId = d.qrcode_id;
    for (let i = 0; i < 60; i++) {
      await new Promise(r => setTimeout(r, 2000));
      try {
        const sr = await fetch('/api/ilink/qrcode-status?qrcode_id=' + encodeURIComponent(qrcodeId));
        const sd = await sr.json();
        if (sd.connected) {
          statusEl.textContent = '✅ 绑定成功！微信消息已接入 AI 工作队';
          statusEl.style.color = '#22c55e';
          qrDiv.style.display = 'none';
          setTimeout(() => location.reload(), 2000);
          return;
        }
      } catch(e) {}
    }
    statusEl.textContent = '二维码已过期，请重试';
    qrDiv.style.display = 'none';
    btn.style.display = 'inline-block';
    btn.disabled = false;
    btn.textContent = '💬 绑定微信 ClawBot';
  } catch(e) {
    statusEl.textContent = '连接失败: ' + e.message;
    btn.disabled = false;
    btn.textContent = '💬 绑定微信 ClawBot';
  }
};
</script>
</body>
</html>
