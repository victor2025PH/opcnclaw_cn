<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0b0b16;
  color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  user-select: none;
  -webkit-user-select: none;
}
.logo { font-size: 48px; margin-bottom: 16px; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #c8c8d8; }
.loader {
  width: 120px; height: 4px;
  background: #1a1a2e;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 12px;
}
.loader-bar {
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, #7c6aef, #e94560);
  border-radius: 2px;
  animation: slide 1.2s ease-in-out infinite;
}
@keyframes slide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}
.hint { font-size: 12px; color: #666; }
</style>
</head>
<body>
  <div class="logo">🦞</div>
  <h1>十三香小龙虾 AI</h1>
  <div class="loader"><div class="loader-bar"></div></div>
  <div class="hint">正在启动 AI 引擎...</div>
</body>
</html>
