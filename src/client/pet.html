<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>桌宠</title>
  <style>
    :root {
      --pet-bg: transparent;
      --pet-accent: #7c6aef;
      --pet-accent-glow: rgba(124, 106, 239, 0.45);
      --pet-coral: #ff8a6a;
      --pet-rose: #e94560;
      --pet-violet: #7c3aed;
      --pet-cyan-glow: rgba(34, 211, 238, 0.45);
      --pet-caption-bg: rgba(12, 12, 24, 0.78);
      --pet-caption-border: rgba(255, 255, 255, 0.1);
      --pet-radius: 12px;
      --pet-ease: cubic-bezier(0.34, 1.56, 0.64, 1);
      --pet-breathe: 3.2s ease-in-out infinite;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--pet-bg);
      color: #e8e8f0;
      user-select: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .pet-body, .eye, .pet-stage { animation: none !important; transition: none !important; }
      .pet-stage.bounce .pet-body { transform: none !important; }
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      padding: 8px 10px 10px;
      gap: 8px;
    }
    .drag-bar {
      width: 100%;
      height: 26px;
      border-radius: 8px;
      background: rgba(18, 18, 32, 0.55);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
    }
    .drag-bar[data-tauri-drag-region] { cursor: move; }
    .pet-stage {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .pet-stage:active { transform: scale(0.98); }
    .pet-mic-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      --pet-bump: 0;
      transition: transform 0.09s ease-out;
      transform: scale(calc(1 + var(--pet-bump)));
    }
    @media (prefers-reduced-motion: reduce) {
      .pet-mic-wrap { transition: none; transform: none !important; }
    }
    .pet-body {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.45) 0%, transparent 42%),
        radial-gradient(circle at 35% 30%, var(--pet-coral) 0%, var(--pet-rose) 42%, var(--pet-violet) 100%);
      box-shadow:
        0 8px 32px var(--pet-accent-glow),
        0 2px 8px rgba(0,0,0,0.35),
        inset 0 -8px 20px rgba(0,0,0,0.22),
        inset 0 2px 12px rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.12);
      animation: breathe var(--pet-breathe);
      transition: transform 0.35s var(--pet-ease);
    }
    .pet-stage.bounce .pet-body {
      animation: bounce-pop 0.5s var(--pet-ease);
    }
    @keyframes bounce-pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.14); }
      100% { transform: scale(1); }
    }
    .pet-face {
      position: absolute;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      pointer-events: none;
    }
    .eye {
      position: absolute;
      top: 32%;
      width: 12px;
      height: 16px;
      background: #1a1025;
      border-radius: 50%;
      animation: blink 5s infinite;
    }
    .eye.l { left: 26%; }
    .eye.r { right: 26%; }
    .pupil {
      position: absolute;
      top: 22%;
      left: 18%;
      width: 5px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.85;
      pointer-events: none;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.045); }
    }
    @keyframes blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.12); }
    }
    .pet-stage.state-listening .pet-body {
      animation: breathe 1.75s ease-in-out infinite;
      box-shadow:
        0 8px 40px var(--pet-cyan-glow),
        inset 0 -8px 20px rgba(0,0,0,0.2);
    }
    .pet-stage.state-processing .pet-body {
      animation: breathe 2.2s linear infinite;
      filter: saturate(1.15);
    }
    .pet-stage.state-speaking .pet-body {
      animation: pulse-speak 0.55s var(--pet-ease) infinite;
    }
    @keyframes pulse-speak {
      0%, 100% { transform: scale(1.04); }
      50% { transform: scale(1.11); }
    }
    .pet-stage.state-thinking .pet-body {
      animation: breathe 2s ease-in-out infinite;
      filter: hue-rotate(28deg) saturate(1.2);
    }
    .pet-stage.state-error .pet-body {
      animation: none;
      filter: grayscale(0.35) hue-rotate(-20deg);
      box-shadow: 0 6px 24px rgba(248, 113, 113, 0.35);
    }
    .caption {
      width: 100%;
      min-height: 38px;
      max-height: 80px;
      overflow: hidden;
      padding: 8px 10px;
      border-radius: var(--pet-radius);
      background: var(--pet-caption-bg);
      border: 1px solid var(--pet-caption-border);
      font-size: 12px;
      line-height: 1.45;
      text-align: center;
      color: rgba(255,255,255,0.9);
      word-break: break-word;
    }
    .status-line {
      font-size: 10px;
      font-weight: 600;
      color: var(--pet-accent);
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="drag-bar" data-tauri-drag-region>拖动 · 双击回主窗口 · 托盘可隐藏</div>
    <div class="pet-stage state-idle" id="petStage" aria-label="桌宠" title="单击弹跳 · 双击打开主窗口">
      <div class="pet-mic-wrap" id="petMicWrap">
        <div class="pet-body" id="petBody"></div>
        <div class="pet-face">
          <span class="eye l"><span class="pupil" id="pupilL"></span></span>
          <span class="eye r"><span class="pupil" id="pupilR"></span></span>
        </div>
      </div>
    </div>
    <div class="caption" id="caption">
      <div class="status-line" id="statusLine">就绪</div>
      <div id="captionText">双击我开始对话</div>
    </div>

    <!-- 输入面板（双击桌宠弹出） -->
    <div class="pet-input-panel" id="petInputPanel">
      <div class="pip-header">🦞 有什么可以帮你的？</div>
      <div class="pip-quick">
        <button class="pip-btn team-btn" data-task="帮我写一个营销推广方案" data-tpl="marketing">📣 写方案</button>
        <button class="pip-btn team-btn" data-task="帮我做一份竞品分析报告" data-tpl="consulting">🔬 竞品</button>
        <button class="pip-btn team-btn" data-task="帮我上架一款新产品" data-tpl="ecommerce">🛍️ 上新品</button>
        <button class="pip-btn team-btn" data-task="帮我写技术方案" data-tpl="software">💻 技术</button>
      </div>
      <div class="pip-input-row">
        <input type="text" id="petInput" placeholder="告诉AI团队你想做什么..." autocomplete="off">
        <button id="petSendBtn">🚀</button>
      </div>
    </div>

    <!-- 团队进度面板 -->
    <div class="pet-team-panel" id="petTeamPanel">
      <div class="ptp-header" id="ptpHeader">👔 团队工作中...</div>
      <div class="ptp-agents" id="ptpAgents"></div>
      <div class="ptp-result" id="ptpResult"></div>
      <div class="ptp-actions" id="ptpActions"></div>
    </div>

    <!-- 右键菜单 -->
    <div class="pet-context-menu" id="petContextMenu">
      <button class="pcm-item" data-action="chat">💬 打开聊天</button>
      <button class="pcm-item" data-action="team-status">👥 团队状态</button>
      <div class="pcm-sep"></div>
      <button class="pcm-item" data-action="task" data-tpl="marketing">📣 快速：营销方案</button>
      <button class="pcm-item" data-action="task" data-tpl="consulting">🔬 快速：竞品分析</button>
      <button class="pcm-item" data-action="task" data-tpl="ecommerce">🛍️ 快速：上架产品</button>
      <div class="pcm-sep"></div>
      <button class="pcm-item" data-action="admin">📊 管理面板</button>
      <button class="pcm-item" data-action="settings">⚙️ 设置</button>
    </div>
  </div>

  <style>
    /* 输入面板 */
    .pet-input-panel{
      display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      width:280px;background:rgba(12,12,24,0.95);border:1px solid rgba(255,255,255,0.12);
      border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,0.6);
      animation:pipSlideUp 0.2s ease-out;z-index:100;
    }
    .pet-input-panel.open{display:block}
    @keyframes pipSlideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .pip-header{font-size:13px;font-weight:600;margin-bottom:8px;text-align:center}
    .pip-quick{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;justify-content:center}
    .pip-btn{padding:5px 10px;border-radius:16px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.06);color:#e8e8f0;font-size:11px;cursor:pointer;transition:all 0.15s}
    .pip-btn:hover{background:rgba(124,106,239,0.25);border-color:var(--pet-accent)}
    .pip-btn.team-btn{background:linear-gradient(135deg,rgba(124,106,239,0.3),rgba(139,92,246,0.3));border-color:rgba(124,106,239,0.4)}
    .pip-input-row{display:flex;gap:6px}
    .pip-input-row input{flex:1;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(0,0,0,0.3);color:#fff;font-size:12px;outline:none}
    .pip-input-row input:focus{border-color:var(--pet-accent)}
    .pip-input-row button{width:36px;height:36px;border-radius:10px;border:none;
      background:var(--pet-accent);color:#fff;font-size:16px;cursor:pointer}

    /* 团队进度面板 */
    .pet-team-panel{
      display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      width:300px;max-height:360px;overflow-y:auto;
      background:rgba(12,12,24,0.95);border:1px solid rgba(255,255,255,0.12);
      border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:100;
    }
    .pet-team-panel.open{display:block}
    .ptp-header{font-size:13px;font-weight:600;margin-bottom:8px}
    .ptp-agents{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
    .ptp-agent{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 6px;border-radius:6px;
      background:rgba(255,255,255,0.04)}
    .ptp-agent .a-avatar{font-size:16px}
    .ptp-agent .a-name{flex:1;color:#ccc}
    .ptp-agent .a-status{font-size:10px}
    .ptp-agent.done .a-status{color:#22c55e}
    .ptp-agent.working .a-status{color:#f59e0b}
    .ptp-agent.pending .a-status{color:#666}
    .ptp-result{font-size:11px;line-height:1.5;max-height:180px;overflow-y:auto;
      background:rgba(0,0,0,0.2);border-radius:8px;padding:8px;margin-bottom:8px;display:none}
    .ptp-result.has-content{display:block}
    .ptp-actions{display:flex;gap:6px;justify-content:center}
    .ptp-actions button{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.06);color:#e8e8f0;font-size:11px;cursor:pointer}

    /* 右键菜单 */
    .pet-context-menu{
      display:none;position:absolute;z-index:200;
      background:rgba(12,12,24,0.96);border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;padding:4px 0;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.6);
    }
    .pet-context-menu.open{display:block}
    .pcm-item{display:block;width:100%;padding:8px 14px;border:none;background:none;
      color:#e8e8f0;font-size:12px;text-align:left;cursor:pointer}
    .pcm-item:hover{background:rgba(124,106,239,0.2)}
    .pcm-sep{height:1px;margin:4px 8px;background:rgba(255,255,255,0.08)}
  </style>

  <script>
    (function () {
      var stage = document.getElementById('petStage');
      var statusLine = document.getElementById('statusLine');
      var captionText = document.getElementById('captionText');
      var pupilL = document.getElementById('pupilL');
      var pupilR = document.getElementById('pupilR');
      var reduced = false;
      try {
        reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      } catch (_) {}

      var labels = {
        idle: '就绪',
        listening: '正在听…',
        processing: '处理中…',
        thinking: '思考中…',
        speaking: '说话中…',
        error: '异常'
      };

      function setVisualState(s) {
        var key = s || 'idle';
        stage.className = 'pet-stage state-' + key;
        statusLine.textContent = labels[key] || labels.idle;
      }

      var lastAppliedTs = 0;
      var lastMic = 0;
      var lastAud = 0;
      var micWrap = document.getElementById('petMicWrap');
      function recomputePetBump() {
        if (!micWrap) return;
        var bump;
        var mode = 'sum';
        try {
          mode = localStorage.getItem('oc_pet_level_mode') || 'sum';
        } catch (_) {}
        var m = lastMic;
        var a = lastAud;
        if (mode === 'max') {
          bump = Math.min(0.24, Math.max(m * 0.14, a * 0.12));
        } else {
          bump = Math.min(0.24, m * 0.14 + a * 0.12);
        }
        if (reduced) bump = 0;
        micWrap.style.setProperty('--pet-bump', String(bump));
      }
      try {
        window.addEventListener('storage', function (e) {
          if (e.key === 'oc_pet_level_mode') recomputePetBump();
        });
      } catch (_) {}
      function applyPayload(d) {
        if (!d) return;
        if (d.petLevelMode !== undefined) {
          try {
            localStorage.setItem('oc_pet_level_mode', d.petLevelMode);
          } catch (_) {}
        }
        if (d.micLevel !== undefined) lastMic = Number(d.micLevel) || 0;
        if (d.playbackLevel !== undefined) lastAud = Number(d.playbackLevel) || 0;
        if (d.micLevel !== undefined || d.playbackLevel !== undefined || d.petLevelMode !== undefined) {
          recomputePetBump();
        }
        var onlyLevels =
          d.visualState === undefined &&
          d.subtitle === undefined &&
          d.status === undefined;
        if (onlyLevels) return;
        var t = typeof d.ts === 'number' ? d.ts : 0;
        if (t && t < lastAppliedTs) return;
        if (t) lastAppliedTs = t;
        if (d.visualState) setVisualState(d.visualState);
        if (d.subtitle !== undefined) captionText.textContent = d.subtitle;
        if (d.status && !d.visualState) statusLine.textContent = d.status;
      }

      try {
        var ch = new BroadcastChannel('openclaw-pet');
        ch.onmessage = function (e) {
          var d = e.data || {};
          if (!d.ts) d.ts = Date.now();
          applyPayload(d);
        };
      } catch (_) {}

      var sseOk = false;
      try {
        var es = new EventSource('/api/pet/events');
        es.onopen = function () { sseOk = true; };
        es.onmessage = function (ev) {
          try {
            var d = JSON.parse(ev.data);
            applyPayload(d);
          } catch (_) {}
        };
        es.onerror = function () {
          sseOk = false;
          try { es.close(); } catch (_) {}
        };
      } catch (_) {}

      function schedulePetPoll() {
        setTimeout(function () {
          fetch('/api/pet/state')
            .then(function (r) { return r.json(); })
            .then(function (d) { applyPayload(d); })
            .catch(function () {})
            .finally(function () {
              schedulePetPoll();
            });
        }, sseOk ? 5200 : 2400);
      }
      schedulePetPoll();

      setVisualState('idle');
      recomputePetBump();

      stage.addEventListener('click', function () {
        if (reduced) return;
        stage.classList.remove('bounce');
        void stage.offsetWidth;
        stage.classList.add('bounce');
        setTimeout(function () { stage.classList.remove('bounce'); }, 520);
      });

      // ── 双击：弹出输入面板（替代打开主窗口）──
      stage.addEventListener('dblclick', function (ev) {
        ev.preventDefault();
        toggleInputPanel();
      });

      // ── 右键菜单 ──
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        var menu = document.getElementById('petContextMenu');
        menu.style.left = Math.min(e.clientX, window.innerWidth - 190) + 'px';
        menu.style.top = Math.max(0, e.clientY - 200) + 'px';
        menu.classList.add('open');
      });
      document.addEventListener('click', function() {
        document.getElementById('petContextMenu').classList.remove('open');
      });
      document.querySelectorAll('.pcm-item').forEach(function(item) {
        item.addEventListener('click', function() {
          var action = item.dataset.action;
          if (action === 'chat') window.open('/app', '_blank');
          else if (action === 'admin') window.open('/admin', '_blank');
          else if (action === 'settings') window.open('/app#settings', '_blank');
          else if (action === 'team-status') showTeamStatus();
          else if (action === 'task') launchTeam(item.dataset.tpl, '');
        });
      });

      // ── 输入面板逻辑 ──
      var inputPanel = document.getElementById('petInputPanel');
      var teamPanel = document.getElementById('petTeamPanel');
      var petInput = document.getElementById('petInput');
      var currentTeamId = null;
      var pollTimer = null;

      function toggleInputPanel() {
        teamPanel.classList.remove('open');
        inputPanel.classList.toggle('open');
        if (inputPanel.classList.contains('open')) {
          setTimeout(function() { petInput.focus(); }, 100);
        }
      }

      // 快捷任务按钮
      document.querySelectorAll('.pip-btn.team-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          launchTeam(btn.dataset.tpl, btn.dataset.task);
        });
      });

      // 输入框发送
      document.getElementById('petSendBtn').addEventListener('click', function() {
        var text = petInput.value.trim();
        if (text) launchTeam('startup', text);
      });
      petInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var text = petInput.value.trim();
          if (text) launchTeam('startup', text);
        }
      });

      // ── 团队调度核心 ──
      function launchTeam(template, task) {
        inputPanel.classList.remove('open');
        if (!task) task = prompt('请输入任务描述：');
        if (!task) return;

        setVisualState('thinking');
        captionText.textContent = '正在组建团队...';

        // 创建团队
        fetch('/api/agents/team/create', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({template_id: template || 'startup'})
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.ok) { captionText.textContent = '创建失败'; return; }
          currentTeamId = d.team.team_id;
          var agents = d.team.agents;

          // 显示团队面板
          setVisualState('thinking');
          showTeamPanel(d.team.name, agents, 'executing');

          // 执行任务
          return fetch('/api/agents/team/' + currentTeamId + '/execute', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({task: task})
          });
        })
        .then(function(r) { if(r) return r.json(); })
        .then(function(d) {
          if (!d) return;
          captionText.textContent = '团队在工作了...';
          stage.className = 'pet-stage state-speaking'; // 指挥模式

          // 开始轮询状态
          startPollTeam();
        })
        .catch(function(e) {
          setVisualState('error');
          captionText.textContent = '出错了: ' + e.message;
        });
      }

      function showTeamPanel(name, agents, status) {
        teamPanel.classList.add('open');
        document.getElementById('ptpHeader').textContent =
          (status === 'done' ? '✅ ' : '👔 ') + name;

        var agentsHtml = '';
        var keys = Object.keys(agents);
        for (var i = 0; i < keys.length; i++) {
          var a = agents[keys[i]];
          var s = a.status || 'idle';
          var icon = s === 'done' ? '✅' : s === 'working' ? '🔄' : '⏳';
          agentsHtml += '<div class="ptp-agent ' + s + '">' +
            '<span class="a-avatar">' + (a.avatar || '🤖') + '</span>' +
            '<span class="a-name">' + (a.name || keys[i]) + '</span>' +
            '<span class="a-status">' + icon + '</span></div>';
        }
        document.getElementById('ptpAgents').innerHTML = agentsHtml;
      }

      function startPollTeam() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(function() {
          if (!currentTeamId) return;
          fetch('/api/agents/team/' + currentTeamId + '/status')
            .then(function(r) { return r.json(); })
            .then(function(d) {
              if (!d.ok && !d.agents) return;
              var agents = d.agents || {};
              var tasks = d.tasks || [];
              var done = 0;
              for (var i = 0; i < tasks.length; i++) {
                if (tasks[i].status === 'done') done++;
              }

              showTeamPanel(d.name || '团队', agents, d.status);
              captionText.textContent = done + '/' + tasks.length + ' 任务完成';

              if (d.status === 'done' || d.status === 'error') {
                clearInterval(pollTimer);
                pollTimer = null;

                if (d.status === 'done') {
                  setVisualState('idle');
                  captionText.textContent = '搞定啦！点击查看结果';
                  stage.classList.add('bounce');
                  setTimeout(function() { stage.classList.remove('bounce'); }, 600);
                  loadResult();
                } else {
                  setVisualState('error');
                  captionText.textContent = '执行出错了';
                }
              }
            })
            .catch(function() {});
        }, 3000);
      }

      function loadResult() {
        fetch('/api/agents/team/' + currentTeamId + '/result')
          .then(function(r) { return r.json(); })
          .then(function(d) {
            var result = d.result || '(无结果)';
            var el = document.getElementById('ptpResult');
            el.textContent = result.substring(0, 500) + (result.length > 500 ? '...' : '');
            el.classList.add('has-content');

            document.getElementById('ptpActions').innerHTML =
              '<button onclick="copyResult()">📋 复制</button>' +
              '<button onclick="window.open(\'/app\',\'_blank\')">💬 继续聊</button>' +
              '<button onclick="closeTeamPanel()">✕ 关闭</button>';
          });
      }

      function showTeamStatus() {
        fetch('/api/agents/teams')
          .then(function(r) { return r.json(); })
          .then(function(d) {
            var teams = d.teams || [];
            if (teams.length === 0) {
              captionText.textContent = '暂无团队在工作';
              return;
            }
            var last = teams[teams.length - 1];
            currentTeamId = last.team_id;
            showTeamPanel(last.name, last.agents, last.status);
            if (last.status === 'executing' || last.status === 'planning') startPollTeam();
            else if (last.status === 'done') loadResult();
          });
      }

      window.copyResult = function() {
        var text = document.getElementById('ptpResult').textContent;
        navigator.clipboard.writeText(text).then(function() {
          captionText.textContent = '已复制到剪贴板';
        });
      };
      window.closeTeamPanel = function() {
        teamPanel.classList.remove('open');
        document.getElementById('ptpResult').classList.remove('has-content');
        document.getElementById('ptpActions').innerHTML = '';
      };

      // 点击外部关闭面板
      document.addEventListener('click', function(e) {
        if (!inputPanel.contains(e.target) && !stage.contains(e.target)) {
          inputPanel.classList.remove('open');
        }
      });

      async function tryFocusMain() {
        try {
          var core = window.__TAURI__ && window.__TAURI__.core;
          if (core && typeof core.invoke === 'function') {
            await core.invoke('focus_main_window');
            return;
          }
          if (window.__TAURI__ && typeof window.__TAURI__.invoke === 'function') {
            await window.__TAURI__.invoke('focus_main_window');
            return;
          }
        } catch (err) {
          console.warn('[pet] focus main', err);
        }
        try {
          window.open('/app', '_blank', 'noopener');
        } catch (_) {}
      }

      if (!reduced && pupilL && pupilR) {
        document.addEventListener('mousemove', function (e) {
          var r = stage.getBoundingClientRect();
          var cx = r.left + r.width / 2;
          var cy = r.top + r.height / 2;
          var dx = (e.clientX - cx) / (r.width || 1);
          var dy = (e.clientY - cy) / (r.height || 1);
          var mx = Math.max(-1, Math.min(1, dx)) * 3;
          var my = Math.max(-1, Math.min(1, dy)) * 2;
          pupilL.style.transform = 'translate(' + mx + 'px,' + my + 'px)';
          pupilR.style.transform = 'translate(' + mx + 'px,' + my + 'px)';
        });
      }
    })();
  </script>
</body>
</html>
