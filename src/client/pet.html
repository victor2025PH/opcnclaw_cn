<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI助手</title>
<style>
:root{--eye-color:#00FFFF;--glow:rgba(0,255,255,0.4);--body-bg:linear-gradient(180deg,#fff 0%,#eef2ff 60%,#dbeafe 100%)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent;user-select:none;font-family:-apple-system,sans-serif}

/* ── 机器人容器（全屏可拖拽区域）── */
.robot-wrap{
  position:fixed;width:130px;height:180px;cursor:grab;z-index:9999;
  bottom:30px;right:30px;
  transition:filter 0.3s;
}
.robot-wrap:active{cursor:grabbing}
.robot-wrap:hover .robot-body-group{transform:scale(1.05)}

/* ── 机器人主体 ── */
.robot-body-group{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform 0.3s ease;
}

/* 浮动动画 */
.robot-float{animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── 头部 ── */
.head{
  position:relative;z-index:3;width:72px;height:52px;
  background:radial-gradient(circle at 50% 10%,#fff 0%,#eef2ff 60%,#dbeafe 100%);
  border-radius:50% 50% 45% 45%;
  box-shadow:inset 0 -2px 6px rgba(0,0,0,0.1),0 5px 15px rgba(0,0,0,0.08);
}
.head-shine{position:absolute;top:4px;left:25%;width:50%;height:40%;background:#fff;opacity:0.6;border-radius:50%;filter:blur(2px)}

/* 面罩（眼睛区域）*/
.visor{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-45%);
  width:85%;height:65%;background:#0a0a1a;
  border-radius:40% 40% 45% 45%;
  display:flex;align-items:center;justify-content:center;gap:12px;
  box-shadow:inset 0 0 8px rgba(255,255,255,0.1);
  border:1px solid rgba(50,50,80,0.5);overflow:hidden;
}

/* 数字眼 */
.eye{
  width:20px;height:16px;background:#001020;overflow:hidden;position:relative;
  border-radius:50%;border:1px solid var(--eye-color);
  box-shadow:0 0 5px var(--glow);transition:all 0.3s;
}
.eye-lines{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;gap:1px}
.eye-line{width:100%;height:2px;background:var(--eye-color);box-shadow:0 0 2px var(--eye-color);transition:background 0.5s}
.eye-glow{position:absolute;inset:0;background:var(--eye-color);opacity:0.15;filter:blur(3px)}

/* 眼睛表情 */
.expr-happy .eye{border-radius:50% 50% 20% 20%;transform:scaleY(0.6)}
.expr-blink .eye{transform:scaleY(0.1) scaleX(1.1)}
.expr-scared .eye{transform:scaleY(1.3) scaleX(0.7);border-radius:40%}
.expr-scan .eye{animation:eye-scan 1s linear infinite}
@keyframes eye-scan{0%{box-shadow:0 0 5px var(--glow),inset 0 -16px 0 var(--eye-color)}100%{box-shadow:0 0 5px var(--glow),inset 0 16px 0 var(--eye-color)}}

/* ── 颈部 ── */
.neck{width:3px;height:10px;background:var(--eye-color);opacity:0.3;box-shadow:0 0 5px var(--eye-color);margin:-2px auto}

/* ── 身体 ── */
.body{
  position:relative;z-index:2;width:56px;height:72px;
  background:var(--body-bg);
  border-radius:30% 30% 40% 40% / 20% 20% 35% 35%;
  box-shadow:inset 0 -3px 8px rgba(0,0,0,0.08),0 4px 12px rgba(0,0,0,0.06);
  border:1px solid rgba(200,210,230,0.5);
}
/* 胸口能量核心 */
.core{
  position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
  width:12px;height:12px;border-radius:50%;
  background:var(--eye-color);box-shadow:0 0 10px var(--glow),0 0 20px var(--glow);
  animation:core-pulse 2s ease-in-out infinite;
}
@keyframes core-pulse{0%,100%{opacity:0.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}}

/* ── 手臂 ── */
.arm{
  position:absolute;top:12px;width:12px;height:50px;z-index:1;
  transition:transform 0.4s ease;
}
.arm svg{width:100%;height:100%}
.arm-l{left:-14px;transform-origin:top right}
.arm-r{right:-14px;transform-origin:top left}

/* 手臂动画 */
.mode-wave .arm-r{animation:wave 1s ease-in-out infinite}
@keyframes wave{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(-50deg)}}
.mode-dance .arm-l{animation:dance-l 0.4s ease infinite}
.mode-dance .arm-r{animation:dance-r 0.4s ease infinite alternate}
@keyframes dance-l{0%,100%{transform:rotate(5deg)}50%{transform:rotate(45deg)}}
@keyframes dance-r{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(-45deg)}}
.mode-fly .arm-l{transform:rotate(35deg)}
.mode-fly .arm-r{transform:rotate(-35deg)}
.mode-scared .arm-l{transform:rotate(150deg)}
.mode-scared .arm-r{transform:rotate(-150deg)}

/* ── 行为模式 ── */
.mode-idle .robot-float{animation:float 2.5s ease-in-out infinite}
.mode-dance .robot-float{animation:bounce 0.4s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.mode-fly .robot-float{animation:none;transform:translateY(-20px)}
.mode-scared .robot-float{animation:shake 0.3s ease infinite}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.mode-spin .head{animation:spin 0.8s ease-in-out}
@keyframes spin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}

/* ── 颜色循环 ── */
@keyframes color-cycle{0%{--eye-color:#00FFFF}25%{--eye-color:#A855F7}50%{--eye-color:#22C55E}75%{--eye-color:#F97316}100%{--eye-color:#00FFFF}}
.robot-body-group{animation:color-cycle 16s linear infinite}

/* ── 状态栏 ── */
.status-bar{
  position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:3px 10px;font-size:10px;color:rgba(255,255,255,0.8);
  white-space:nowrap;pointer-events:none;
}

/* ── 输入面板 ── */
.input-panel{
  display:none;position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);
  width:280px;background:rgba(8,8,20,0.95);border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:100;
  pointer-events:auto;
}
.input-panel.open{display:block;animation:slideUp 0.2s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pip-header{font-size:13px;font-weight:600;margin-bottom:8px;text-align:center;color:#e8e8f0}
.pip-quick{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;justify-content:center}
.pip-btn{padding:5px 10px;border-radius:16px;border:1px solid rgba(255,255,255,0.15);
  background:linear-gradient(135deg,rgba(0,255,255,0.15),rgba(168,85,247,0.15));
  color:#e8e8f0;font-size:11px;cursor:pointer;transition:all 0.15s}
.pip-btn:hover{background:linear-gradient(135deg,rgba(0,255,255,0.3),rgba(168,85,247,0.3));border-color:var(--eye-color)}
.pip-row{display:flex;gap:6px}
.pip-row input{flex:1;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.3);color:#fff;font-size:12px;outline:none}
.pip-row button{width:36px;height:36px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#00FFFF,#A855F7);color:#fff;font-size:16px;cursor:pointer}

/* ── 右键菜单 ── */
.ctx-menu{
  display:none;position:fixed;z-index:10000;
  background:rgba(8,8,20,0.96);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:4px 0;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.6);
}
.ctx-menu.open{display:block}
.ctx-item{display:block;width:100%;padding:8px 14px;border:none;background:none;
  color:#e8e8f0;font-size:12px;text-align:left;cursor:pointer}
.ctx-item:hover{background:rgba(0,255,255,0.15)}
.ctx-sep{height:1px;margin:4px 8px;background:rgba(255,255,255,0.08)}

/* ── 团队进度面板 ── */
.team-panel{
  display:none;position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);
  width:300px;max-height:360px;overflow-y:auto;
  background:rgba(8,8,20,0.95);border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:100;
  pointer-events:auto;
}
.team-panel.open{display:block}
.tp-header{font-size:13px;font-weight:600;margin-bottom:8px;color:#e8e8f0}
.tp-agent{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 6px;border-radius:6px;
  background:rgba(255,255,255,0.04);margin-bottom:3px;color:#ccc}
.tp-agent .av{font-size:16px}
.tp-agent .nm{flex:1}
.tp-agent .st{font-size:10px}
.tp-agent.done .st{color:#22c55e}
.tp-agent.working .st{color:#f59e0b}
.tp-result{font-size:11px;line-height:1.5;max-height:180px;overflow-y:auto;
  background:rgba(0,0,0,0.2);border-radius:8px;padding:8px;margin-top:8px;display:none;color:#ddd}
.tp-result.show{display:block}
.tp-actions{display:flex;gap:6px;justify-content:center;margin-top:8px}
.tp-actions button{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);color:#e8e8f0;font-size:11px;cursor:pointer}
</style>
</head>
<body>

<!-- 机器人 -->
<div class="robot-wrap" id="robotWrap">
  <div class="robot-body-group mode-idle" id="robotGroup">
    <div class="robot-float">
      <!-- 头部 -->
      <div class="head">
        <div class="head-shine"></div>
        <div class="visor" id="visor">
          <div class="eye" id="eyeL">
            <div class="eye-lines"><div class="eye-line"></div><div class="eye-line"></div><div class="eye-line"></div><div class="eye-line"></div><div class="eye-line"></div></div>
            <div class="eye-glow"></div>
          </div>
          <div class="eye" id="eyeR">
            <div class="eye-lines"><div class="eye-line"></div><div class="eye-line"></div><div class="eye-line"></div><div class="eye-line"></div><div class="eye-line"></div></div>
            <div class="eye-glow"></div>
          </div>
        </div>
      </div>
      <!-- 颈部 -->
      <div class="neck"></div>
      <!-- 身体 -->
      <div class="body" style="position:relative">
        <div class="core"></div>
        <!-- 手臂 -->
        <div class="arm arm-l">
          <svg viewBox="0 0 18 64" fill="none"><path d="M16 2C16 2 4 10 4 28C4 50 12 60 16 62C17 62.5 18 60 18 56C18 56 18 10 16 2Z" fill="url(#ag)"/><defs><linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient></defs></svg>
        </div>
        <div class="arm arm-r">
          <svg viewBox="0 0 18 64" fill="none" style="transform:scaleX(-1)"><path d="M16 2C16 2 4 10 4 28C4 50 12 60 16 62C17 62.5 18 60 18 56C18 56 18 10 16 2Z" fill="url(#ag2)"/><defs><linearGradient id="ag2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient></defs></svg>
        </div>
      </div>
    </div>
  </div>
  <div class="status-bar" id="statusBar">就绪</div>

  <!-- 输入面板 -->
  <div class="input-panel" id="inputPanel">
    <div class="pip-header">🤖 有什么可以帮你的？</div>
    <div class="pip-quick">
      <button class="pip-btn" onclick="launchTask('marketing','帮我写营销方案，请先问我需求')">📣 方案</button>
      <button class="pip-btn" onclick="launchTask('consulting','帮我做竞品分析，请先问我需求')">🔬 竞品</button>
      <button class="pip-btn" onclick="launchTask('ecommerce','帮我上架新品，请先问我需求')">🛍️ 新品</button>
      <button class="pip-btn" onclick="launchTask('software','帮我写技术方案，请先问我需求')">💻 技术</button>
    </div>
    <div class="pip-row">
      <input type="text" id="petInput" placeholder="告诉AI团队你想做什么...">
      <button onclick="sendInput()">🚀</button>
    </div>
  </div>

  <!-- 团队面板 -->
  <div class="team-panel" id="teamPanel">
    <div class="tp-header" id="tpHeader">👔 团队工作中...</div>
    <div id="tpAgents"></div>
    <div class="tp-result" id="tpResult"></div>
    <div class="tp-actions" id="tpActions"></div>
  </div>
</div>

<!-- 右键菜单 -->
<div class="ctx-menu" id="ctxMenu">
  <button class="ctx-item" onclick="window.open('/app','_blank')">💬 打开聊天</button>
  <button class="ctx-item" onclick="showTeamStatus()">👥 团队状态</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" onclick="launchTask('marketing','')">📣 快速：营销方案</button>
  <button class="ctx-item" onclick="launchTask('consulting','')">🔬 快速：竞品分析</button>
  <button class="ctx-item" onclick="launchTask('ecommerce','')">🛍️ 快速：上架产品</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" onclick="window.open('/admin','_blank')">📊 管理面板</button>
  <button class="ctx-item" onclick="window.open('/app#settings','_blank')">⚙️ 设置</button>
</div>

<script>
var wrap = document.getElementById('robotWrap');
var group = document.getElementById('robotGroup');
var statusBar = document.getElementById('statusBar');
var inputPanel = document.getElementById('inputPanel');
var teamPanel = document.getElementById('teamPanel');
var ctxMenu = document.getElementById('ctxMenu');
var visor = document.getElementById('visor');

// ── 拖拽移动 ──
var dragging = false, dragStartX, dragStartY, wrapStartX, wrapStartY;
wrap.addEventListener('mousedown', function(e) {
  if (e.target.closest('.input-panel') || e.target.closest('.team-panel') || e.target.closest('.pip-btn') || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  var rect = wrap.getBoundingClientRect();
  wrapStartX = rect.left;
  wrapStartY = rect.top;
  wrap.style.transition = 'none';
});
document.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var x = wrapStartX + (e.clientX - dragStartX);
  var y = wrapStartY + (e.clientY - dragStartY);
  // 边界检测
  x = Math.max(0, Math.min(window.innerWidth - 130, x));
  y = Math.max(0, Math.min(window.innerHeight - 180, y));
  wrap.style.left = x + 'px';
  wrap.style.top = y + 'px';
  wrap.style.right = 'auto';
  wrap.style.bottom = 'auto';
});
document.addEventListener('mouseup', function() {
  if (dragging) { dragging = false; wrap.style.transition = ''; }
});

// ── 点击飞行（点击桌面空白处机器人飞过去）──
document.addEventListener('click', function(e) {
  if (dragging) return;
  if (e.target.closest('.robot-wrap') || e.target.closest('.ctx-menu')) return;
  ctxMenu.classList.remove('open');
  // 飞到点击位置
  var tx = e.clientX - 65;
  var ty = e.clientY - 90;
  tx = Math.max(0, Math.min(window.innerWidth - 130, tx));
  ty = Math.max(0, Math.min(window.innerHeight - 180, ty));
  setMode('fly');
  wrap.style.transition = 'left 0.6s ease, top 0.6s ease';
  wrap.style.left = tx + 'px';
  wrap.style.top = ty + 'px';
  wrap.style.right = 'auto';
  wrap.style.bottom = 'auto';
  setTimeout(function() { setMode('idle'); wrap.style.transition = ''; }, 700);
});

// ── 双击弹出输入框 ──
wrap.addEventListener('dblclick', function(e) {
  e.preventDefault();
  e.stopPropagation();
  teamPanel.classList.remove('open');
  inputPanel.classList.toggle('open');
  if (inputPanel.classList.contains('open')) {
    setTimeout(function() { document.getElementById('petInput').focus(); }, 100);
  }
});

// ── 右键菜单 ──
wrap.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  e.stopPropagation();
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = Math.max(0, e.clientY - 250) + 'px';
  ctxMenu.classList.add('open');
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.ctx-menu')) ctxMenu.classList.remove('open');
});

// ── 鼠标悬停 → 挥手 ──
wrap.addEventListener('mouseenter', function() { if (!dragging) setMode('wave'); });
wrap.addEventListener('mouseleave', function() { if (!dragging) setMode('idle'); });

// ── 表情和模式 ──
var currentMode = 'idle';
function setMode(mode) {
  currentMode = mode;
  group.className = 'robot-body-group mode-' + mode;
  // 表情联动
  visor.className = 'visor';
  if (mode === 'wave') visor.classList.add('expr-happy');
  else if (mode === 'scared') visor.classList.add('expr-scared');
  else if (mode === 'scan') visor.classList.add('expr-scan');
}

// ── 随机行为 ──
setInterval(function() {
  if (currentMode !== 'idle' && currentMode !== 'scan') return;
  var r = Math.random();
  var next = r > 0.92 ? 'spin' : r > 0.82 ? 'dance' : r > 0.70 ? 'scan' : 'idle';
  setMode(next);
  if (next !== 'idle') setTimeout(function() { setMode('idle'); }, next === 'dance' ? 3000 : 2000);
}, 5000);

// ── 眨眼 ──
setInterval(function() {
  if (currentMode === 'idle') {
    visor.classList.add('expr-blink');
    setTimeout(function() { visor.classList.remove('expr-blink'); }, 150);
  }
}, 3000 + Math.random() * 2000);

// ── 团队调度 ──
var currentTeamId = null;
var pollTimer = null;

function launchTask(tpl, task) {
  inputPanel.classList.remove('open');
  ctxMenu.classList.remove('open');
  if (!task) task = prompt('请输入任务描述：');
  if (!task) return;

  setMode('scan');
  statusBar.textContent = '组建团队中...';

  fetch('/api/agents/team/create', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({template_id: tpl})
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (!d.ok) { statusBar.textContent = '创建失败'; return; }
    currentTeamId = d.team.team_id;
    showTeamPanel(d.team.name, d.team.agents, 'executing');
    return fetch('/api/agents/team/' + currentTeamId + '/execute', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task: task})
    });
  })
  .then(function(r) { if(r) return r.json(); })
  .then(function() {
    setMode('dance');
    statusBar.textContent = '团队工作中...';
    startPoll();
  })
  .catch(function(e) { setMode('scared'); statusBar.textContent = '出错: ' + e.message; });
}

function sendInput() {
  var text = document.getElementById('petInput').value.trim();
  if (text) launchTask('startup', text);
  document.getElementById('petInput').value = '';
}
document.getElementById('petInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendInput();
});

function showTeamPanel(name, agents, status) {
  teamPanel.classList.add('open');
  document.getElementById('tpHeader').textContent = (status === 'done' ? '✅ ' : '👔 ') + name;
  var html = '';
  var keys = Object.keys(agents);
  for (var i = 0; i < keys.length; i++) {
    var a = agents[keys[i]];
    var s = a.status || 'idle';
    var icon = s === 'done' ? '✅' : s === 'working' ? '🔄' : '⏳';
    html += '<div class="tp-agent ' + s + '"><span class="av">' + (a.avatar||'🤖') + '</span><span class="nm">' + (a.name||keys[i]) + '</span><span class="st">' + icon + '</span></div>';
  }
  document.getElementById('tpAgents').innerHTML = html;
}

function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(function() {
    if (!currentTeamId) return;
    fetch('/api/agents/team/' + currentTeamId + '/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      showTeamPanel(d.name || '团队', d.agents || {}, d.status);
      var tasks = d.tasks || [];
      var done = tasks.filter(function(t){return t.status==='done'}).length;
      statusBar.textContent = done + '/' + tasks.length + ' 完成';
      if (d.status === 'done') {
        clearInterval(pollTimer);
        setMode('wave');
        statusBar.textContent = '搞定啦！';
        loadResult();
      } else if (d.status === 'error') {
        clearInterval(pollTimer);
        setMode('scared');
        statusBar.textContent = '执行出错';
      }
    });
  }, 3000);
}

function loadResult() {
  fetch('/api/agents/team/' + currentTeamId + '/result')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var el = document.getElementById('tpResult');
    el.textContent = (d.result || '').substring(0, 500);
    el.classList.add('show');
    document.getElementById('tpActions').innerHTML =
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'tpResult\').textContent)">📋 复制</button>' +
      '<button onclick="window.open(\'/app\',\'_blank\')">💬 继续</button>' +
      '<button onclick="teamPanel.classList.remove(\'open\');document.getElementById(\'tpResult\').classList.remove(\'show\')">✕</button>';
  });
}

function showTeamStatus() {
  ctxMenu.classList.remove('open');
  fetch('/api/agents/teams').then(function(r){return r.json()}).then(function(d) {
    var teams = d.teams || [];
    if (!teams.length) { statusBar.textContent = '暂无团队'; return; }
    var last = teams[teams.length-1];
    currentTeamId = last.team_id;
    showTeamPanel(last.name, last.agents, last.status);
    if (last.status === 'done') loadResult();
    else if (last.status !== 'error') startPoll();
  });
}

// ── 状态同步（从主窗口接收）──
try {
  var ch = new BroadcastChannel('openclaw-pet');
  ch.onmessage = function(e) {
    var d = e.data || {};
    if (d.visualState === 'listening') setMode('scan');
    else if (d.visualState === 'thinking') setMode('scan');
    else if (d.visualState === 'speaking') setMode('dance');
    else if (d.visualState === 'error') setMode('scared');
    if (d.subtitle) statusBar.textContent = d.subtitle.substring(0, 30);
  };
} catch(e) {}

// SSE
try {
  var es = new EventSource('/api/pet/events');
  es.onmessage = function(ev) {
    try {
      var d = JSON.parse(ev.data);
      if (d.visualState) {
        if (d.visualState === 'listening') setMode('scan');
        else if (d.visualState === 'speaking') setMode('dance');
      }
      if (d.subtitle) statusBar.textContent = d.subtitle.substring(0, 30);
    } catch(e) {}
  };
} catch(e) {}
</script>
