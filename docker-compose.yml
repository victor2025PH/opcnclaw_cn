


version: "3.8"

services:
  openclaw:
    build: .
    container_name: openclaw-ai
    restart: unless-stopped
    ports:
      - "8765:8765"
      - "8766:8766"
    volumes:
      - openclaw-data:/app/data
      - openclaw-logs:/app/logs
      - openclaw-ssl:/app/ssl
    env_file:
      - .env
    environment:
      - OPENCLAW_HOST=0.0.0.0
      - OPENCLAW_PORT=8765
      - OPENCLAW_HTTP_PORT=8766
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8766/api/health',timeout=3); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  openclaw-data:
  openclaw-logs:
  openclaw-ssl:
